<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECE Notes</title>

<style>
body {
    margin:0;
    font-family: Arial;
}

/* Topbar */
.topbar {
    background:#2f3241;
    color:white;
    padding:12px 15px;
    display:flex;
    align-items:center;
}

/* Hamburger */
.menu-btn {
    font-size:20px;
    margin-right:15px;
    cursor:pointer;
    display:none;
}

/* Title */
.title {
    font-size:18px;
}

/* Top Menu */
.menu {
    display:flex;
    background:#ddd;
}

.menu button {
    padding:10px 15px;
    border:none;
    background:none;
    cursor:pointer;
}

.activeMenu {
    background:#ccc;
}

/* Layout */
.container {
    display:flex;
    height:calc(100vh - 90px);
}

/* Sidebar */
.sidebar {
    width:200px;
    background:#eee;
    border-right:1px solid #ccc;
    transition:0.3s;
}

.sidebar button {
    width:100%;
    padding:12px;
    border:none;
    background:none;
    text-align:left;
    cursor:pointer;
}

.sidebar button:hover,
.active {
    background:#0ea56b;
    color:white;
}

/* Content */
.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* Buttons */
.nav-btns {
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.btn {
    padding:10px 20px;
    background:#0ea56b;
    color:white;
    border:none;
    cursor:pointer;
}

/* MOBILE */
@media (max-width:768px){

    .menu-btn {
        display:block;
    }

    .container {
        flex-direction:column;
        height:auto;
    }

    .sidebar {
        position:fixed;
        top:50px;
        left:-220px;
        height:100%;
        z-index:1000;
    }

    .sidebar.show {
        left:0;
    }

    .menu {
        overflow-x:auto;
    }

    .content {
        padding:15px;
    }
}
</style>

</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <span class="title">ECE Notes</span>
</div>

<!-- Top Menu -->
<div class="menu">
    <button onclick="setCategory(0)" class="activeMenu">Computer</button>
    <button onclick="setCategory(1)">MS Word</button>
    <button onclick="setCategory(2)">Excel</button>
    <button onclick="setCategory(3)">Internet</button>
</div>

<div class="container">

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>

<!-- Content -->
<div class="content">

<div id="content"></div>

<div class="nav-btns">
<button class="btn" onclick="prevPage()">← Previous</button>
<button class="btn" onclick="nextPage()">Next →</button>
</div>

</div>

</div>

<script>

// DATA
const data = [

[
{title:"Introduction", content:`<h1>Computer Fundamentals</h1>
<p>Computer ek electronic device hai jo input leta hai aur output deta hai.</p>`},

{title:"Memory", content:`<h1>Memory</h1><p>Memory data store karti hai.</p>`},

{title:"CPU", content:`<h1>CPU</h1><p>CPU computer ka brain hota hai.</p>`}
],

[
{title:"Word Intro", content:`<h1>MS Word</h1><p>MS Word ek word processing software hai.</p>`},

{title:"Formatting", content:`<h1>Formatting</h1><p>Bold, Italic, Font size change karna formatting hai.</p>`}
],

[
{title:"Excel Intro", content:`<h1>Excel</h1><p>Spreadsheet software hai.</p>`}
],

[
{title:"Internet", content:`<h1>Internet</h1><p>Global network hai.</p>`}
]

];

let currentCategory = 0;
let currentPage = 0;

// Sidebar
function loadSidebar(){
    let sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    data[currentCategory].forEach((item,i)=>{
        let btn = document.createElement("button");
        btn.innerText = item.title;
        btn.onclick = ()=>loadPage(i);

        if(i === currentPage) btn.classList.add("active");

        sidebar.appendChild(btn);
    });
}

// Load content
function loadPage(i){
    currentPage = i;
    document.getElementById("content").innerHTML =
        data[currentCategory][i].content;

    loadSidebar();

    // mobile pe menu band
    document.getElementById("sidebar").classList.remove("show");
}

// Category
function setCategory(i){
    currentCategory = i;
    currentPage = 0;

    document.querySelectorAll(".menu button")
        .forEach(b=>b.classList.remove("activeMenu"));

    event.target.classList.add("activeMenu");

    loadSidebar();
    loadPage(0);
}

// Toggle sidebar (mobile)
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("show");
}

// Next/Prev
function nextPage(){
    if(currentPage < data[currentCategory].length-1)
        loadPage(currentPage+1);
}

function prevPage(){
    if(currentPage > 0)
        loadPage(currentPage-1);
}

// Init
loadSidebar();
loadPage(0);

</script>

</body>
</html>
