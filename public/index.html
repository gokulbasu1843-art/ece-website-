<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECE Computer Center</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Navbar */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #111;
    color: white;
}

nav a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

/* HERO SLIDER */
.hero {
    position: relative;
    height: 400px;
    overflow: hidden;
}

/* Slides */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s;
}

.slide.active {
    opacity: 1;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Text */
.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
}

.btn {
    margin-top: 15px;
    padding: 10px 25px;
    background: yellow;
    border: none;
    cursor: pointer;
}

/* Buttons */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* Courses */
.courses {
    text-align: center;
    padding: 50px;
    background: #eee;
}

.course-list {
    margin-top: 20px;
}

.course-list span {
    display: inline-block;
    padding: 12px 25px;
    margin: 10px;
    background: white;
    border-radius: 25px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.course-list span:hover {
    background: #0072ff;
    color: white;
    transform: scale(1.1);
}

/* Contact */
.contact {
    padding: 40px;
    text-align: center;
}

/* Footer */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<header>
    <h2>ECE Computer Center</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#courses">Courses</a>
        <a href="notes.html">Notes</a>
        <a href="#">Login</a>
    </nav>
</header>

<!-- SLIDER -->
<section class="hero" id="slider">

    <div class="slide active">
        <img src="https://images.unsplash.com/photo-1581090700227-1e8c3c1a1b90">
    </div>

    <div class="slide">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
    </div>

    <div class="slide">
        <img src="https://images.unsplash.com/photo-1501504905252-473c47e087f8">
    </div>

    <!-- TEXT -->
    <div class="hero-text">
        <h1>Learn Computer Skills Easily 💻</h1>
        <p>PGDCA | ADCA | DCA</p>
        <button class="btn">Enroll Now</button>
    </div>

    <!-- CONTROLS -->
    <span class="prev" onclick="moveSlide(-1)">❮</span>
    <span class="next" onclick="moveSlide(1)">❯</span>

</section>

<!-- COURSES -->
<section id="courses" class="courses">
    <h2>Our Courses</h2>

    <div class="course-list">
        <span>PGDCA</span>
        <span>ADCA</span>
        <span>DCA</span>
    </div>
</section>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact Us</h2>
    <p>📞 Phone: +91 XXXXXXXX</p>
    <p>📧 Email: ece@gmail.com</p>
</section>

<footer>
    © 2026 ECE Computer Center, Kalapani
</footer>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(){
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
}

function moveSlide(n){
    index += n;
    if(index >= slides.length) index = 0;
    if(index < 0) index = slides.length - 1;
    showSlide();
}

// Auto slide
setInterval(() => moveSlide(1), 4000);

// Swipe
let startX = 0;
let slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if(startX - endX > 50) moveSlide(1);
    if(endX - startX > 50) moveSlide(-1);
});
</script>

</body>
</html>
