<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECE Notes</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* Header */
header{
    background:#2f3241;
    color:white;
    padding:15px;
    text-align:center;
}

/* Grid */
.notes-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

/* Card */
.note-card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.note-card:hover{
    transform:translateY(-5px);
}

/* Button */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#0ea56b;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
    <h1>ECE Notes</h1>
</header>

<div class="notes-container">

    <div class="note-card">
        <h2>Computer Fundamentals</h2>
        <p>Basic computer notes PDF</p>
        <a href="notes/computer.pdf" class="btn" target="_blank">
            Open 
        </a>
    </div>

    <div class="note-card">
        <h2>MS Word</h2>
        <p>MS Word complete notes</p>
        <a href="notes/msword.pdf" class="btn" target="_blank">
            Open
        </a>
    </div>

    <div class="note-card">
        <h2>MS Excel</h2>
        <p>Excel formulas and basics</p>
        <a href="notes/excel.pdf" class="btn" target="_blank">
            Open
        </a>
    </div>

</div>

</body>
</html>
